name: Build V8 Android Prebuilt

on:
  workflow_dispatch:
    inputs:
      v8_version:
        description: "V8 crate version (e.g. 146.4.0)"
        required: true
        default: "146.4.0"
      num_jobs:
        description: "Ninja parallelism (NUM_JOBS). Lower = less RAM."
        required: true
        default: "2"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      V8_VERSION: ${{ inputs.v8_version }}
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.0"
          targets: aarch64-linux-android

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3 pkg-config

      - name: Install Android NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 27
        run: sdkmanager --install "ndk;27.2.12479018"

      - name: Configure Android toolchain
        run: |
          NDK_HOME="$ANDROID_HOME/ndk/27.2.12479018"
          TOOLCHAIN="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
          LINKER="$TOOLCHAIN/bin/aarch64-linux-android35-clang"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$LINKER" >> "$GITHUB_ENV"
          echo "CC_aarch64_linux_android=$LINKER" >> "$GITHUB_ENV"
          echo "CXX_aarch64_linux_android=$TOOLCHAIN/bin/aarch64-linux-android35-clang++" >> "$GITHUB_ENV"
          echo "AR_aarch64_linux_android=$TOOLCHAIN/bin/llvm-ar" >> "$GITHUB_ENV"
          echo "RANLIB_aarch64_linux_android=$TOOLCHAIN/bin/llvm-ranlib" >> "$GITHUB_ENV"
          ln -sf "$TOOLCHAIN/bin/llvm-ranlib" "$TOOLCHAIN/bin/aarch64-linux-android-ranlib"
          ln -sf "$TOOLCHAIN/bin/llvm-ar"     "$TOOLCHAIN/bin/aarch64-linux-android-ar"
          echo "$TOOLCHAIN/bin" >> "$GITHUB_PATH"

      - name: Add swap
        run: |
          sudo fallocate -l 16G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h

      - name: Configure googlesource.com auth
        env:
          GITCOOKIES: ${{ secrets.GOOGLESOURCE_GITCOOKIES }}
        run: |
          echo "$GITCOOKIES" > ~/.gitcookies
          chmod 600 ~/.gitcookies
          git config --global http.cookiefile ~/.gitcookies

      - name: Clone rusty_v8
        run: |
          git clone --depth 1 --branch "v${V8_VERSION}" \
            https://github.com/denoland/rusty_v8.git /tmp/rusty_v8
          echo "V8_ROOT=/tmp/rusty_v8" >> "$GITHUB_ENV"

      - name: Fetch submodules sequentially
        working-directory: /tmp/rusty_v8
        run: |
          # googlesource.com rate-limits (429) aggressively. git submodule
          # update does internal immediate retries that burn rate budget.
          # Use raw git clone instead for full control over timing.

          clone_submodule() {
            local path=$1
            local url=$(git config --file .gitmodules --get "submodule.$path.url")
            local sha=$(git ls-tree HEAD "$path" | awk '{print $3}')

            echo "::group::$path"
            rm -rf "$path"
            if git clone --depth 1 "$url" "$path" 2>&1 && \
               cd "$path" && git fetch --depth 1 origin "$sha" 2>&1 && \
               git checkout "$sha" 2>&1; then
              cd /tmp/rusty_v8
              echo "  ✓ ok"
            else
              cd /tmp/rusty_v8
              echo "  ✗ FAILED (continuing)"
            fi
            echo "::endgroup::"
          }

          # Rewrite googlesource.com submodules to GitHub mirrors (429 rate limits)
          git config --file .gitmodules submodule.tools/clang.url \
            https://github.com/mevanlc/chromium-tools-clang.git
          git config --file .gitmodules submodule.buildtools.url \
            https://github.com/mevanlc/chromium-buildtools.git
          git config --file .gitmodules submodule.third_party/jinja2.url \
            https://github.com/mevanlc/chromium-third_party-jinja2.git
          git config --file .gitmodules submodule.third_party/markupsafe.url \
            https://github.com/mevanlc/chromium-third_party-markupsafe.git
          git config --file .gitmodules submodule.third_party/abseil-cpp.url \
            https://github.com/mevanlc/chromium-third_party-abseil-cpp.git
          git config --file .gitmodules submodule.third_party/rust.url \
            https://github.com/mevanlc/chromium-third_party-rust.git
          git config --file .gitmodules submodule.third_party/simdutf.url \
            https://github.com/mevanlc/chromium-third_party-simdutf.git

          # Split submodules by actual host (check URL column, not key)
          github_mods=()
          google_mods=()
          while IFS=' ' read -r key url; do
            mod=$(echo "$key" | sed 's/submodule\.\(.*\)\.url/\1/')
            case "$url" in
              https://github.com/*) github_mods+=("$mod") ;;
              *)                    google_mods+=("$mod") ;;
            esac
          done < <(git config --file .gitmodules --get-regexp 'url')

          # GitHub-hosted submodules first (no rate issues)
          for mod in "${github_mods[@]}"; do
            clone_submodule "$mod"
          done

          # googlesource.com submodules: one at a time, 5s pause before each
          for mod in "${google_mods[@]}"; do
            sleep 5
            clone_submodule "$mod"
          done

          # Pre-populate repos that build.rs clones for Android targets
          # (not submodules — cloned directly by build.rs at build time)
          # Pre-populate repos that build.rs clones for Android targets
          # (not submodules — cloned directly by build.rs at build time)
          echo "::group::Pre-populating build.rs Android deps"
          curl -sL https://github.com/mevanlc/codex/releases/download/v8-deps/android_platform.tar.gz \
            | tar xz -C third_party/
          curl -sL https://github.com/mevanlc/codex/releases/download/v8-deps/catapult.tar.gz \
            | tar xz -C third_party/
          # Symlink android_toolchain/ndk -> android_ndk (GN expects the former,
          # build.rs creates the latter)
          mkdir -p third_party/android_toolchain
          ln -sf ../android_ndk third_party/android_toolchain/ndk

          # Empty file normally generated by gclient sync
          touch build/config/gclient_args.gni

          ls third_party/android_platform/ third_party/catapult/tracing/BUILD.gn
          echo "::endgroup::"

          echo "All submodules fetched."

      - name: Install libclang for bindgen (Clang 22)
        run: |
          set -euxo pipefail
          # rusty_v8's build.rs generates FFI bindings with bindgen, which loads
          # libclang via LIBCLANG_PATH and calls LIBCLANG_PATH/../bin/clang
          # -print-resource-dir. V8 147's vendored libc++ requires Clang 20+
          # (uses __builtin_clzg/ctzg); ubuntu-24.04's default clang-18 can't parse
          # it. Chromium's matching clang-23 is tip-of-tree (not on apt) and its
          # libclang package ships only Python bindings, so use apt.llvm.org's
          # newest stable (clang-22, >= the libc++ headers' stated floor of 20).
          # The ninja build is unaffected: it uses V8's own downloaded clang-23.
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 22
          sudo apt-get install -y libclang-22-dev
          test -f /usr/lib/llvm-22/lib/libclang.so
          test -x /usr/lib/llvm-22/bin/clang
          echo "LIBCLANG_PATH=/usr/lib/llvm-22/lib" >> "$GITHUB_ENV"
          # Fail fast (seconds, before the ~2h ninja build) if clang-22 cannot parse
          # the exact libc++ headers that errored, using the same flags build.rs
          # feeds bindgen. <type_traits>/<bit>/<algorithm> pull in is_convertible.h,
          # __bit/countl.h, __algorithm/sort.h — the headers from the failed run.
          RESDIR=$(/usr/lib/llvm-22/bin/clang -print-resource-dir)
          printf '#include <type_traits>\n#include <bit>\n#include <algorithm>\nint main(){}\n' > /tmp/probe.cc
          cd "$V8_ROOT"
          /usr/lib/llvm-22/bin/clang -xc++ -std=c++20 -nostdinc++ \
            -isystem buildtools/third_party/libc++ \
            -isystem third_party/libc++/src/include \
            -isystem third_party/libc++abi/src/include \
            -isystem "$RESDIR/include" -fsyntax-only /tmp/probe.cc
          echo "clang-22 parsed V8 147 libc++ headers OK"

      - name: Create builder crate
        run: |
          mkdir -p v8-builder/src
          cat > v8-builder/Cargo.toml << EOF
          [package]
          name = "v8-builder"
          version = "0.0.0"
          edition = "2021"

          [dependencies]
          v8 = { path = "/tmp/rusty_v8" }
          EOF
          echo 'fn main() {}' > v8-builder/src/main.rs

      - name: Install V8 host sysroot
        continue-on-error: true
        run: |
          # V8's gn build needs a debian bullseye amd64 sysroot for host tools.
          cd "$V8_ROOT"
          python3 build/linux/sysroot_scripts/install-sysroot.py --arch=amd64

      - name: Show environment
        run: |
          echo "=== Rust ===" && rustc --version && cargo --version
          echo "=== System ===" && free -h && nproc && df -h /
          echo "=== V8 root ===" && ls "$V8_ROOT"/build/linux/ | head -10

      - name: Build V8 from source
        working-directory: v8-builder
        continue-on-error: true
        env:
          V8_FROM_SOURCE: "1"
          NUM_JOBS: ${{ inputs.num_jobs }}
        run: |
          cargo build --target aarch64-linux-android --release 2>&1 | tee /tmp/v8-build.log

      - name: Extract artifacts
        id: artifacts
        run: |
          # Find the built static library
          LIB=$(find v8-builder/target -name 'librusty_v8.a' -path '*/gn_out/obj/*' | head -1)
          echo "Found lib: $LIB ($(du -h "$LIB" | cut -f1))"

          # Find the generated binding
          BINDING=$(find v8-builder/target -name 'src_binding.rs' -path '*/gn_out/*' | head -1)
          echo "Found binding: $BINDING ($(wc -l < "$BINDING") lines)"

          # Rename per rusty_v8 convention
          STAGING=/tmp/v8-artifacts
          mkdir -p "$STAGING"
          cp "$LIB"     "$STAGING/librusty_v8_release_aarch64-linux-android.a"
          cp "$BINDING"  "$STAGING/src_binding_release_aarch64-linux-android.rs"
          gzip -9 "$STAGING/librusty_v8_release_aarch64-linux-android.a"

          ls -lh "$STAGING"/
          echo "staging=$STAGING" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: v8-android-prebuilt-${{ inputs.v8_version }}
          path: |
            ${{ steps.artifacts.outputs.staging }}/librusty_v8_release_aarch64-linux-android.a.gz
            ${{ steps.artifacts.outputs.staging }}/src_binding_release_aarch64-linux-android.rs

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v8-build-log
          path: /tmp/v8-build.log

      - name: Show tail on failure
        if: failure()
        run: tail -200 /tmp/v8-build.log

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: v8-android-prebuilt-${{ inputs.v8_version }}
          path: artifacts

      - name: Create release with prebuilt artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v8-v${{ inputs.v8_version }}"

          # Create the release (or reuse existing)
          gh release create "$TAG" \
            --title "v8 $TAG (Android aarch64 prebuilt)" \
            --notes "Prebuilt \`librusty_v8\` static library and FFI bindings for \`aarch64-linux-android\`." \
            --latest=false \
            2>/dev/null || echo "Release $TAG already exists, uploading assets."

          # Upload (--clobber overwrites if re-running)
          gh release upload "$TAG" \
            --clobber \
            artifacts/librusty_v8_release_aarch64-linux-android.a.gz \
            artifacts/src_binding_release_aarch64-linux-android.rs

          echo "### Uploaded to: https://github.com/${{ github.repository }}/releases/tag/$TAG" >> "$GITHUB_STEP_SUMMARY"

name: Android aarch64 Release

on:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute version
        id: version
        run: |
          # Find the tag with the most commits in common with HEAD
          # (i.e. whose merge-base with HEAD is closest to HEAD).
          best_tag=""
          best_dist=999999999
          short=$(git rev-parse --short=7 HEAD)

          for tag in $(git tag -l); do
            # Only consider tags containing a rust-v version
            case "$tag" in *rust-v*) ;; *) continue ;; esac

            mb=$(git merge-base HEAD "$tag" 2>/dev/null) || continue
            dist=$(git rev-list --count "$mb..HEAD" 2>/dev/null) || continue

            if [ "$dist" -lt "$best_dist" ]; then
              best_dist=$dist
              best_tag=$tag
            fi
          done

          if [ -n "$best_tag" ]; then
            # Extract the version portion after 'rust-v'
            tag_ver=$(echo "$best_tag" | sed 's/.*rust-v//')
            if [ "$best_dist" -eq 0 ]; then
              version="$tag_ver"
            else
              version="${tag_ver}-${best_dist}-g${short}"
            fi
          else
            version="0.0.0-g${short}"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Version: $version (tag: ${best_tag:-none}, distance: ${best_dist})"

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.0"
          targets: aarch64-linux-android

      - name: Install Android NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 27
        run: sdkmanager --install "ndk;27.2.12479018"

      - name: Configure Android toolchain
        run: |
          NDK_HOME="$ANDROID_HOME/ndk/27.2.12479018"
          TOOLCHAIN="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
          LINKER="$TOOLCHAIN/bin/aarch64-linux-android35-clang"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$LINKER" >> "$GITHUB_ENV"
          echo "CC_aarch64_linux_android=$LINKER" >> "$GITHUB_ENV"
          echo "AR_aarch64_linux_android=$TOOLCHAIN/bin/llvm-ar" >> "$GITHUB_ENV"
          echo "RANLIB_aarch64_linux_android=$TOOLCHAIN/bin/llvm-ranlib" >> "$GITHUB_ENV"
          # Create prefixed symlinks that vendored OpenSSL expects
          ln -sf "$TOOLCHAIN/bin/llvm-ranlib" "$TOOLCHAIN/bin/aarch64-linux-android-ranlib"
          ln -sf "$TOOLCHAIN/bin/llvm-ar"     "$TOOLCHAIN/bin/aarch64-linux-android-ar"
          echo "$TOOLCHAIN/bin" >> "$GITHUB_PATH"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: codex-rs -> target

      - name: Add swap for linker
        run: |
          sudo fallocate -l 8G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
        working-directory: /

      - name: Build codex
        env:
          CARGO_BUILD_JOBS: "2"
          CARGO_PROFILE_RELEASE_LTO: "thin"
          RUSTY_V8_ARCHIVE: https://github.com/mevanlc/codex/releases/download/v8-v146.4.0/librusty_v8_release_aarch64-linux-android.a.gz
          RUSTY_V8_SRC_BINDING_PATH: /tmp/v8_binding.rs
          RUSTFLAGS: -C link-arg=/usr/local/lib/android/sdk/ndk/27.2.12479018/toolchains/llvm/prebuilt/linux-x86_64/lib/clang/18/lib/linux/libclang_rt.builtins-aarch64-android.a
        run: |
          set -euxo pipefail
          trap 'status=$?; echo "Build codex failed with status $status"; echo "V8-related files under target:"; find target -maxdepth 10 \( -path "*/build/v8-*/out/*" -o -name "librusty_v8*.a" -o -name "*.sum" \) -print 2>/dev/null | sort || true; exit "$status"' ERR
          echo "Rusty V8 environment:"
          env | sort | grep -E '^(AR_|CC_|CARGO_TARGET_AARCH64|RANLIB_|RUSTFLAGS|RUSTY_V8_)' || true
          echo "Rusty V8 archive headers:"
          curl -fLI "$RUSTY_V8_ARCHIVE"
          curl -fLsS -o /tmp/rusty_v8_archive.a.gz "$RUSTY_V8_ARCHIVE"
          echo "Downloaded archive details:"
          ls -l /tmp/rusty_v8_archive.a.gz
          gzip -l /tmp/rusty_v8_archive.a.gz
          curl -fLsS -o /tmp/v8_binding.rs \
            https://github.com/mevanlc/codex/releases/download/v8-v146.4.0/src_binding_release_aarch64-linux-android.rs
          echo "Downloaded binding details:"
          ls -l /tmp/v8_binding.rs
          wc -c /tmp/v8_binding.rs
          sed -n '1,5p' /tmp/v8_binding.rs
          cargo build --verbose --release --bin codex --target aarch64-linux-android
          echo "Post-build V8-related files under target:"
          find target -maxdepth 10 \( -path "*/build/v8-*/out/*" -o -name "librusty_v8*.a" -o -name "*.sum" \) -print 2>/dev/null | sort

      - name: Compress binary
        run: |
          zstd -19 target/aarch64-linux-android/release/codex \
            -o codex-aarch64-linux-android.zst

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-aarch64-linux-android
          path: codex-rs/codex-aarch64-linux-android.zst

    outputs:
      version: ${{ steps.version.outputs.version }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: codex-aarch64-linux-android

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-${{ needs.build.outputs.version }}
          name: Android aarch64 ${{ needs.build.outputs.version }}
          prerelease: false
          make_latest: true
          files: codex-aarch64-linux-android.zst
          body: |
            Codex CLI for Android aarch64 (Termux) — with code-mode (V8/JS REPL).

            Version: `${{ needs.build.outputs.version }}`
            Commit: `${{ github.sha }}`

            ```sh
            zstd -d codex-aarch64-linux-android.zst -o codex
            chmod +x codex
            ```
